<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Simple Stock Calculators</title>
  <link rel="icon" type="image/x-icon" href="/stock-market.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <link rel="stylesheet" type="text/css" href="css/styles.css?v=3.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <canvas id="stock-chart" width="800" height="600"></canvas>

  <main class="container my-4 my-md-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8 col-xl-7">

        <div class="card custom-card">
          <div class="dark-mode-toggle">
            <label class="switch">
              <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
              <span class="slider round"></span>
            </label>
          </div>
          <div class="card-body text-center">
            <h2>About</h2>
            <p class="mb-0">This is a simplified stock calculator made by @Ovalvoi
              <br>When a loss is calculated, a break-even function is shown.
            </p>
          </div>
        </div>

        <div class="card custom-card">
          <div class="card-body p-lg-5">
            <h1 class="text-center text-md-start mb-4">Investment Calculator</h1>

            <div class="calculator-container">
              <div>
                <label for="initialPrice">Initial Stock Price:</label>
                <input type="text" id="initialPrice" inputmode="numeric" pattern="[0-9eE\-\.]*"
                  aria-label="Initial stock price" placeholder="Enter number" autofocus>
              </div>
              <div>
                <label for="currentPrice">Current Stock Price:</label>
                <input type="text" id="currentPrice" inputmode="numeric" pattern="[0-9eE\-\.]*"
                  aria-label="Current stock price" placeholder="Enter number">
              </div>
              <div>
                <label for="moneyInvested">Money Invested (Optional):</label>
                <input type="text" id="moneyInvested" inputmode="numeric" pattern="[0-9eE\-\.]*"
                  aria-label="Money invested, optional" placeholder="Enter number">
              </div>
              <div>
                <label for="taxRate">Estimated Tax Rate (%):</label>
                <input type="text" id="taxRate" inputmode="numeric" pattern="[0-9eE\-\.]*"
                  aria-label="Estimated tax rate percentage" placeholder="Enter tax % (e.g., 25)">
              </div>
              <div class="text-center">
                <button onclick="calculateInvestmentResults()"
                  aria-label="Calculate investment results">Calculate</button>
              </div>
            </div>

            <div id="investment-result" class="result-container mt-4"></div>

            <div class="link-row">
              <a href="https://github.com/Ovalvoi/Stockcal" target="_blank" rel="noopener noreferrer" class="brand-link d-inline-flex align-items-center gap-2">
                <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                  <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.63 7.63 0 0 1 2.01-.27c.68 0 1.36.09 2.01.27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.19 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
                </svg>
                <span>GitHub</span>
              </a>
              <a href="https://finance.yahoo.com" target="_blank" rel="noopener noreferrer" class="brand-link d-inline-flex align-items-center gap-2">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M6 6l6 6 6-6" />
                  <path d="M12 12v6" />
                </svg>
                <span>Yahoo Finance</span>
              </a>
              <a href="https://www.google.com/finance" target="_blank" rel="noopener noreferrer" class="brand-link d-inline-flex align-items-center gap-2">
                <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 4.5c-4.14 0-7.5 3.36-7.5 7.5s3.36 7.5 7.5 7.5c3.35 0 6.18-2.14 7.16-5.12" fill="none" stroke="currentColor" stroke-width="2" />
                  <path d="M12 4.5h8.5v8.5" fill="none" stroke="currentColor" stroke-width="2" />
                  <path d="M12 12h8.5" fill="none" stroke="currentColor" stroke-width="2" />
                </svg>
                <span>Google Finance</span>
              </a>
              <a href="https://finviz.com" target="_blank" rel="noopener noreferrer" class="brand-link d-inline-flex align-items-center gap-2">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M5 18v-8" />
                  <path d="M9 18v-4" />
                  <path d="M13 18v-6" />
                  <path d="M17 18v-2" />
                  <path d="M5 18h12" />
                </svg>
                <span>Finviz</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="js/script.js?v=3.0"></script>
  <script src="js/darkmode.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/stock.js"></script>
</body>

</html>
